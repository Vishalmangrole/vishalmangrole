<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(120deg, #ff758c, #ff7eb3);
    overflow: hidden;
    color: white;
}

/* Header */
header {
    font-size: 45px;
    padding: 20px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px yellow; }
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -150px;
    width: 60px;
    height: 80px;
    border-radius: 50%;
    animation: floatUp 10s linear infinite;
}

.balloon::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 40px;
    background: white;
    left: 50%;
    top: 80px;
}

@keyframes floatUp {
    0% { transform: translateY(0); }
    100% { transform: translateY(-120vh); }
}

/* Gallery */
.gallery {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    padding: 20px;
}

.gallery img {
    width: 180px;
    height: 180px;
    border-radius: 15px;
    transition: 0.5s;
}

.gallery img:hover {
    transform: scale(1.2) rotate(5deg);
}

/* Typing */
.typing {
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    margin: auto;
    animation: typing 5s steps(40) forwards, blink 0.7s infinite;
}

@keyframes typing {
    to { width: 80%; }
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* Button */
button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #ff4b5c;
    cursor: pointer;
    margin-top: 20px;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
}

/* Fireworks */
.firework {
    position: absolute;
    width: 5px;
    height: 5px;
    background: yellow;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(15); opacity: 0; }
}

</style>
</head>

<body>

<header class="vishal">🎉 HAPPY BIRTHDAY  BRO  💖🎂</header>

<script>
// Confetti
for (let i = 0; i < 60; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
    c.style.animationDuration = (Math.random()*3+2) + "s";
    document.body.appendChild(c);
}
// Fireworks
function createFirework(x, y) {
    let fw = document.createElement("div");
    fw.className = "firework";
    fw.style.left = x + "px";
    fw.style.top = y + "px";
    document.body.appendChild(fw);
    setTimeout(() => fw.remove(), 1000);
}
// Start celebration
function startParty() {
    document.getElementById("music").play();
    alert("🎉 Let the celebration begin! 🎂");
    for (let i = 0; i < 20; i++) {
        setTimeout(() => {
            createFirework(
                Math.random() * window.innerWidth,
                Math.random() * window.innerHeight
            );
        }, i * 200);
    }
}
</script>
